<script type="module">
// --- NEW & IMPROVED AUTO-FETCH LOGIC ---
window.fetchAndCalculatePoints = async function() {
    const status = document.getElementById('fetch-status');
    const matchId = document.getElementById('fetch-match-sel').value;
    if(!matchId || !liveData.cricApiKey) {
        toast('Select a match and ensure API key is set', true);
        return;
    }

    const localMatch = liveData.matches[matchId];
    status.style.color = 'var(--accent)';
    status.textContent = 'Step 1/4: Verifying match on CricAPI...';

    try {
        const searchUrl = `https://api.cricapi.com/v1/currentMatches?apikey=${liveData.cricApiKey}&offset=0`;
        const res = await fetch(searchUrl);
        const searchData = await res.json();
        
        if (searchData.status !== "success") throw new Error(searchData.reason || "API Error");

        // IMPROVED FUZZY VERIFICATION
        const found = searchData.data.find(m => {
            const apiName = m.name.toLowerCase();
            const t1 = localMatch.t1.toLowerCase();
            const t2 = localMatch.t2.toLowerCase();
            // Match is verified if both team identifiers appear in the API match title
            return apiName.includes(t1) && apiName.includes(t2);
        });

        if (!found) throw new Error(`Could not verify ${localMatch.t1} vs ${localMatch.t2} on API.`);

        status.textContent = 'Step 2/4: Fetching full scorecard...';
        const scoreUrl = `https://api.cricapi.com/v1/match_scorecard?apikey=${liveData.cricApiKey}&id=${found.id}`;
        const scoreRes = await fetch(scoreUrl);
        const scoreData = await scoreRes.json();

        if (!scoreData.data || !scoreData.data.scorecard) {
            throw new Error('Scorecard data is not yet available from the API.');
        }

        status.textContent = 'Step 3/4: Calculating Dream11 points...';
        
        // Processing scoring with new eligibility rules
        function calcDream11Points(p) {
            let pts = 0;
            // Batting: Base + Bonuses
            pts += (p.r || 0);
            if (p.r >= 100) pts += 16; else if (p.r >= 50) pts += 8; else if (p.r >= 30) pts += 4;
            
            // Strike Rate Eligibility: Min 10 balls faced
            if (p.b >= 10) {
                const sr = (p.r / p.b) * 100;
                if (sr < 50) pts -= 6; else if (sr < 60) pts -= 4; else if (sr < 70) pts -= 2;
            }

            // Bowling: Wickets + Bonuses
            const wkts = p.wkts || 0;
            pts += wkts * 25;
            if (wkts >= 5) pts += 16; else if (wkts >= 4) pts += 8; else if (wkts >= 3) pts += 4;

            // Economy Eligibility: Min 2 overs bowled
            const overs = (p.o_balls || 0) / 6;
            if (overs >= 2) {
                const eco = (p.runsConceded || 0) / overs;
                if (eco < 5) pts += 6; else if (eco < 6) pts += 4; else if (eco < 7) pts += 2;
                else if (eco >= 11 && eco < 12) pts -= 2; else if (eco >= 12 && eco < 13) pts -= 4;
                else if (eco >= 13) pts -= 6;
            }

            // Fielding
            pts += (p.catches || 0) * 8;
            pts += (p.stumpings || 0) * 12;
            pts += (p.runouts_direct || 0) * 12;
            return pts;
        }

        // Logic to update Firebase with calculated points...
        // ... (Remaining Firebase update logic) ...

        status.style.color = 'var(--green)';
        status.textContent = 'Success: Points verified and updated!';
        toast('Points auto-fetched successfully');

    } catch (e) {
        status.style.color = 'var(--accent2)';
        status.textContent = 'Error: ' + e.message;
    }
};
</script>
